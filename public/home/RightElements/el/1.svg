  <defs>
    <style>
      @keyframes pulseCount {
        0%, 100% { opacity: 1; transform: scaleY(1); }
        50% { opacity: 0.8; transform: scaleY(1.04); }
      }
      @keyframes digitGlow {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      @keyframes numberTick {
        0%, 100% { opacity: 1; transform: translateY(0); }
        25% { opacity: 0.7; transform: translateY(-0.4px); }
        75% { opacity: 0.7; transform: translateY(0.4px); }
      }
      @keyframes colorCycle {
        0%, 100% { fill: #00ff50; }
        50% { fill: #00ebef; }
      }
      .num-prime { animation: pulseCount 2.5s ease-in-out infinite; }
      .num-sec { animation: pulseCount 3.2s ease-in-out infinite 0.8s; }
      .num-tick { animation: numberTick 3s ease-in-out infinite; }
      .num-tick2 { animation: numberTick 3.5s ease-in-out infinite 1.2s; }
      .glow-digit { animation: digitGlow 2s ease-in-out infinite; }
      .glow-digit-delay { animation: digitGlow 2.8s ease-in-out infinite 1s; }
      .color-shift { animation: colorCycle 4s ease-in-out infinite; }
    </style>
