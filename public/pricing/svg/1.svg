      .cls-24 {
        clip-path: url(#clippath);
      }

      .cls-8 {
        fill: url(#radial-gradient-13);
      }

      @keyframes shimmer {
        0%, 100% { opacity: .7; }
        50% { opacity: .35; }
      }

      @keyframes pulse-glow {
        0%, 100% { opacity: .46; filter: brightness(1); }
        50% { opacity: .7; filter: brightness(1.4); }
      }

      @keyframes check-pop {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
      }

      @keyframes bar-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-1.5px); }
      }

      .cls-5 { animation: shimmer 2.4s ease-in-out infinite; animation-delay: 0s; transform-origin: center; }
      .cls-4 { animation: shimmer 2.4s ease-in-out infinite; animation-delay: 0.3s; transform-origin: center; }
      .cls-7 { animation: shimmer 2.4s ease-in-out infinite; animation-delay: 0.6s; transform-origin: center; }
      .cls-6 { animation: shimmer 2.4s ease-in-out infinite; animation-delay: 0.9s; transform-origin: center; }
      .cls-8 { animation: shimmer 2.4s ease-in-out infinite; animation-delay: 1.2s; transform-origin: center; }

      .cls-1, .cls-2 { animation: pulse-glow 3s ease-in-out infinite; }

      .cls-12, .cls-23 { animation: check-pop 2s ease-in-out infinite; transform-origin: center; }

      .cls-16 { animation: bar-float 3s ease-in-out infinite; }
    </style>
